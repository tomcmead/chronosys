services:
  # Development Environment
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/app
      - /app/target
    environment:
      - RUST_LOG=debug

  # Release Test Environment
  release:
    build:
      context: .
      dockerfile: Dockerfile
      target: release
    environment:
      - RUST_LOG=info